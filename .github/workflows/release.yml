# Release — triggered when a tag matching v* is pushed.
#
# Builds optimised binaries for every supported target and publishes them to
# a GitHub Release. The CI workflow already builds these on every push (to
# catch breakage early); this workflow re-runs the build with the tag's
# commit and additionally creates the release.
#
# Bump procedure:
#   1. Update workspace version in Cargo.toml + flyo/web/package.json.
#   2. git commit && git tag vX.Y.Z && git push --follow-tags
#
# The release will appear under Releases tab with all artefacts attached.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish (e.g. v0.2.0)
        required: true

permissions:
  contents: write   # required to create releases + upload assets

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: mipsel-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use-cross: true
            continue-on-error: true

    continue-on-error: ${{ matrix.continue-on-error == true }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: flyo/web/pnpm-lock.yaml

      - name: Build frontend
        shell: bash
        run: |
          pnpm --dir flyo/web install --frozen-lockfile
          pnpm --dir flyo/web build

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} --workspace
          else
            cargo build --release --locked --target ${{ matrix.target }} --workspace
          fi

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package artefact
        shell: bash
        run: |
          set -e
          tag=${{ steps.ver.outputs.tag }}
          stage="flyo-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$stage"
          bin_dir="target/${{ matrix.target }}/release"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "$bin_dir/flyo.exe"        "dist/$stage/"
            cp "$bin_dir/flyo-proxy.exe"  "dist/$stage/"
          else
            cp "$bin_dir/flyo"        "dist/$stage/"
            cp "$bin_dir/flyo-proxy"  "dist/$stage/"
            chmod +x "dist/$stage/flyo" "dist/$stage/flyo-proxy"
          fi
          cp flyo/webd.conf      "dist/$stage/webd.conf.example" 2>/dev/null || true
          cp flyo/README.md      "dist/$stage/" 2>/dev/null || true
          cp flyo-proxy/README.md "dist/$stage/README-proxy.md" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a -tzip "${stage}.zip" "$stage" >/dev/null
            sha256sum "${stage}.zip" > "${stage}.zip.sha256"
          else
            tar czf "${stage}.tar.gz" "$stage"
            sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: flyo-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Flatten artefact directory
        run: |
          mkdir -p release
          find artefacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          ls -lh release

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Flyo ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
